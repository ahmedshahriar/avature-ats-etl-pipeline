project_name: "avature-etl"
bucket_suffix: "outputs"
ddb_table_suffix: "seen-jobs"

# Higher compute allocation for production
ecs_task_cpu: 1024
ecs_task_memory: 2048

# replace with email to receive alerts, or leave null to disable
# github repo secrets is used to set this value in prod for security
alert_email: null

# ECS Scheduler (Runs daily at 9:00 AM UTC)
schedule_hour: "9"
schedule_minute: "0"
schedule_timezone: "UTC"
# the workflow will own the schedule
schedule_enabled: false

# analytics and dashboard settings
dataset_root: "avature"
enable_analytics: true
enable_dashboard: true

# step function
workflow_enabled: true
workflow_timeout_minutes: 180
athena_poll_seconds: 15

# Optional: Enable Container Insights for better monitoring (note: may increase CloudWatch costs)
container_insights_mode: "disabled"
empty_run_threshold: 1
job_detail_success_rate_threshold: 0.95

tags:
  Owner: "ahmed"
  ManagedBy: "cdk"
  CostCenter: "free-tier"

scraper_runtime:
  concurrent_requests: 8
  concurrent_requests_per_domain: 4
  download_delay: 1.0
  download_timeout: 30

  # AutoThrottle tuning
  autothrottle_enabled: true
  autothrottle_start_delay: 1.0
  autothrottle_max_delay: 20.0
  autothrottle_target_concurrency: 1.0
  retry_times: 4

  # Standard logging for prod to save CloudWatch costs
  log_level: "INFO"
  logstats_interval: 30.0

  dynamodb_ttl_days: 60
  ddb_dedupe_fail_open: false
  scrapy_feed_name: "jobs.jsonl"
  metrics_file: "metrics.json"
  run_manifest_file: "run_manifest.json"
  quarantine_file: "quarantine.jsonl"
  portal_summary_file: "portal_summary.jsonl"
