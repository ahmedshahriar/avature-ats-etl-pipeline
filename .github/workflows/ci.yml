# CI — lint, type-check, unit tests, and CDK synthesis validation.
# Runs on every push and pull request to main.
# Does NOT deploy anything or touch AWS.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:  # allows manual runs from the GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: "QA - Lint - Format - Type-check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --frozen --group dev --group infra --group local

      - name: Run pre-commit (ruff + ty)
        run: uv run pre-commit run --all-files

  test:
    name: "Test - Unit tests"
    runs-on: ubuntu-latest
    needs: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --only-group infra

      - name: Run unit tests
        run: uv run pytest -v --tb=short

  synth:
    name: "Synth - CDK synthesis check"
    runs-on: ubuntu-latest
    needs: qa
    # CDK_DEFAULT_ACCOUNT / REGION are shared by all steps in this job.
    # They are intentionally fake — no real AWS calls are made.
    env:
      CDK_DEFAULT_ACCOUNT: "111111111111"
      CDK_DEFAULT_REGION: "us-east-1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install infra dependencies
        run: uv sync --frozen --only-group infra

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      # Dummy VPC context so CDK does not attempt a live AWS lookup.
      - name: Write dummy CDK context for synthesis
        working-directory: infra
        run: |
          cat > cdk.context.json << 'EOF'
          {
            "vpc-provider:account=111111111111:filter.isDefault=true:region=us-east-1:returnAsymmetricSubnets=true": {
              "vpcId": "vpc-11111111",
              "vpcCidrBlock": "172.31.0.0/16",
              "ownerAccountId": "111111111111",
              "availabilityZones": [],
              "subnetGroups": [
                {
                  "name": "Public",
                  "type": "Public",
                  "subnets": [
                    {
                      "subnetId": "subnet-11111111",
                      "cidr": "172.31.0.0/20",
                      "availabilityZone": "us-east-1a",
                      "routeTableId": "rtb-11111111"
                    },
                    {
                      "subnetId": "subnet-22222222",
                      "cidr": "172.31.16.0/20",
                      "availabilityZone": "us-east-1b",
                      "routeTableId": "rtb-22222222"
                    }
                  ]
                }
              ]
            }
          }
          EOF

      - name: CDK synth — dev
        working-directory: infra
        run: |
          cdk synth --app "uv run python app.py" \
            -c env=dev \
            -c imageTag=latest \
            --quiet

      - name: CDK synth — prod
        working-directory: infra
        run: |
          cdk synth --app "uv run python app.py" \
            -c env=prod \
            -c imageTag=latest \
            --quiet
